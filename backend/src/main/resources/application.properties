spring.application.name=wellness-backend

spring.datasource.url=jdbc:mysql://localhost:3306/wellness_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

server.port=8080

spring.config.import=optional:classpath:application-local.properties

# fixed by XieMaonan: 这两行之前是明文写死的真实 key/secret，而且这个文件是被 git 追踪、
# 仓库又是 public 的，等于把 DeepSeek key 和 JWT 签名密钥直接暴露给全网。
# 改成读环境变量，本地开发就设到 application-local.properties（已在 .gitignore 里）
# 或者 shell 的环境变量里，不要再往这个文件里填真实值。
# 注意：旧的 key/secret 已经泄露过，需要单独去 DeepSeek 后台吊销/重新生成，
# 并且换一个新的 jwt.secret（换了之后所有已签发的 token 会失效，需要重新登录）。
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.base-url=https://api.deepseek.com
spring.ai.openai.chat.options.model=deepseek-chat
spring.ai.openai.chat.options.temperature=0.7
jwt.secret=${JWT_SECRET}
